# ── Dialogue d'aide (help.py) ────────────────────────────────────────

help-title: "Aide AnkiBulk"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk est conçu pour ajouter rapidement de nombreuses notes à la fois.
  L'idée est simple : vous tapez des mots dans la colonne du champ de tri
  du tableau — un par ligne — puis vous passez en
  vue Texte pour tout copier dans le presse-papiers. De là,
  collez dans un LLM, un tableur ou tout autre outil pour remplir
  les champs restants. Une fois terminé, collez le résultat
  et cliquez sur Ajout groupé.

help-selection-heading: "Sélection du navigateur"
help-selection-desc: >-
  Sélectionnez une ou plusieurs cartes dans le navigateur avant d'ouvrir AnkiBulk.
  Le type de note de la première carte détermine les colonnes du tableau, et toutes
  les notes sélectionnées apparaissent comme des lignes d'exemple en lecture seule (gris).
  Ces exemples fournissent du contexte lors de la création de nouvelles notes — par exemple,
  un LLM peut voir vos cartes existantes et reproduire le style.
  Si rien n'est sélectionné, vous pouvez choisir n'importe quel type de note manuellement.

help-table-heading: "Vue tableau"
help-table-desc: >-
  Le tableau affiche les notes existantes (lecture seule, gris) et les nouvelles notes
  (modifiables, blanc). Seule la colonne du champ de tri est directement modifiable ;
  double-cliquez sur une autre cellule d'une ligne modifiable pour y accéder.

help-table-insert-clipboard: "Coller le presse-papiers comme nouvelles lignes (une ligne par entrée)."
help-table-update-selection: "Rafraîchir les lignes d'exemple depuis la sélection actuelle."
help-table-right-click-header: "Clic droit sur l'en-tête"
help-table-right-click-header-desc: "Afficher ou masquer des colonnes."
help-table-enter: "Valider la cellule actuelle et passer à la ligne suivante. Une nouvelle ligne est ajoutée automatiquement à la fin."
help-table-delete: "Supprimer la ligne modifiable sélectionnée."
help-table-backspace: "Supprimer la ligne sélectionnée si le champ de tri est vide."

help-text-heading: "Vue texte"
help-text-desc: >-
  Passez en vue Texte pour modifier les notes au format YAML. Le volet supérieur affiche
  vos notes d'exemple sélectionnées ; le volet inférieur est pour vos nouvelles notes.
  Le retour à la vue Tableau valide et applique le YAML.

help-text-options: >-
  Configurez le format de copie (YAML, JSON, XML, CSV ou TSV),
  l'inclusion des notes d'exemple et le texte supplémentaire.
help-text-copy: >-
  Copiez le contenu dans le format choisi, prêt à coller
  dans un LLM ou un autre outil.

help-bulk-add-heading: "Ajout groupé"
help-bulk-add-desc: >-
  Cliquez sur Ajout groupé pour créer des notes à partir de toutes les lignes modifiables
  ayant du contenu dans le champ de tri. Les notes sont ajoutées au paquet sélectionné.

help-link-issues: "Signaler un problème"
help-link-discussions: "Suggestions et discussion"
