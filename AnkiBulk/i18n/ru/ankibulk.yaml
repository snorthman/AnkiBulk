# ── Диалог справки (help.py) ────────────────────────────────────────

help-title: "Справка AnkiBulk"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk предназначен для быстрого добавления множества заметок сразу.
  Идея проста: вы вводите слова в столбец поля сортировки
  таблицы — по одному на строку — затем переключаетесь
  в текстовый режим, чтобы скопировать всё в буфер обмена. Оттуда
  вставьте в LLM, электронную таблицу или другой инструмент,
  чтобы заполнить оставшиеся поля. Когда закончите, вставьте результат обратно
  и нажмите Массовое добавление.

help-selection-heading: "Выбор в браузере"
help-selection-desc: >-
  Выберите одну или несколько карточек в браузере перед открытием AnkiBulk.
  Тип заметки первой карточки определяет столбцы таблицы, а все
  выбранные заметки отображаются как примеры только для чтения (серые).
  Эти примеры дают контекст при заполнении новых заметок — например,
  LLM может увидеть ваши существующие карточки и повторить стиль.
  Если ничего не выбрано, вы можете выбрать любой тип заметки вручную.

help-table-heading: "Режим таблицы"
help-table-desc: >-
  Таблица показывает существующие заметки (только для чтения, серые) и новые
  (редактируемые, белые). Все столбцы в редактируемых строках можно редактировать
  напрямую. Столбец поля сортировки выделен тёплым цветом фона.

help-table-insert-clipboard: "Вставить буфер обмена как новые строки (одна строка на запись)."
help-table-update-selection: "Обновить примеры из текущего выделения."
help-table-right-click-header: "Правый клик по заголовку"
help-table-right-click-header-desc: "Показать или скрыть столбцы."
help-table-enter: "Подтвердить текущую ячейку и перейти к следующей строке. Новая строка добавляется автоматически в конце."
help-table-delete: "Удалить выбранную редактируемую строку."
help-table-backspace: "Удалить выбранную строку, если поле сортировки пусто."

help-text-heading: "Текстовый режим"
help-text-desc: >-
  Переключитесь в текстовый режим для редактирования заметок в формате YAML.
  Верхняя панель показывает выбранные примеры; нижняя — для новых заметок.
  При переключении обратно в таблицу YAML проверяется и применяется.

help-text-options: >-
  Настройте формат копирования (YAML, JSON, XML, CSV или TSV),
  включение примеров и дополнительный текст.
help-text-copy: >-
  Скопируйте содержимое в выбранном формате, готовое для вставки
  в LLM или другой инструмент.

help-bulk-add-heading: "Массовое добавление"
help-bulk-add-desc: >-
  Нажмите Массовое добавление, чтобы создать заметки из всех редактируемых строк
  с содержимым в поле сортировки. Заметки добавляются в выбранную колоду.

help-link-issues: "Сообщить о проблеме"
help-link-discussions: "Предложения и обсуждение"
help-link-github: "GitHub"
