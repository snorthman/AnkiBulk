# ── 帮助对话框 (help.py) ────────────────────────────────────────

help-title: "AnkiBulk 帮助"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk 专为一次性添加大量笔记而设计。
  方法很简单：在表格的排序字段列中输入单词——每行一个——然后切换到
  文本视图，将所有内容复制到剪贴板。接着，
  粘贴到 LLM、电子表格或其他工具中来填写
  剩余字段。完成后，将结果粘贴回来并
  点击批量添加。

help-selection-heading: "浏览器选择"
help-selection-desc: >-
  在打开 AnkiBulk 之前，在浏览器中选择一张或多张卡片。
  第一张卡片的笔记类型决定表格列，所有
  选中的笔记以只读示例行（灰色）显示。
  这些示例在填写新笔记时提供上下文——例如，
  LLM 可以看到你现有的卡片并匹配风格。
  如果未选择任何内容，可以手动选择任意笔记类型。

help-table-heading: "表格视图"
help-table-desc: >-
  表格显示现有笔记（只读，灰色）和新笔记
  （可编辑，白色）。只有排序字段列可直接编辑；
  双击可编辑行中的其他单元格可跳转到该处。

help-table-insert-clipboard: "将剪贴板粘贴为新行（每行一个）。"
help-table-update-selection: "从当前浏览器选择刷新示例行。"
help-table-right-click-header: "右键单击表头"
help-table-right-click-header-desc: "显示或隐藏列。"
help-table-enter: "确认当前单元格并移到下一行。末尾会自动添加新行。"
help-table-delete: "删除选中的可编辑行。"
help-table-backspace: "如果排序字段为空，则删除选中的行。"

help-text-heading: "文本视图"
help-text-desc: >-
  切换到文本视图以 YAML 格式编辑笔记。上方窗格显示
  你选择的示例笔记；下方窗格用于你的新笔记。
  切换回表格视图时会验证并应用 YAML。

help-text-options: >-
  配置复制格式（YAML、JSON、XML、CSV 或 TSV），
  是否包含示例笔记，以及附加文本。
help-text-copy: >-
  以所选格式复制内容，可以直接粘贴
  到 LLM 或其他工具。

help-bulk-add-heading: "批量添加"
help-bulk-add-desc: >-
  点击批量添加，从所有排序字段有内容的可编辑行
  创建笔记。笔记将添加到所选牌组。

help-link-issues: "报告问题"
help-link-discussions: "建议与讨论"
help-link-github: "GitHub"
