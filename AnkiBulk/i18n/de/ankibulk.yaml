# ── Help dialog (help.py) ────────────────────────────────────────────

help-title: "AnkiBulk Hilfe"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk ist dafür gemacht, viele Notizen auf einmal hinzuzufügen.
  Die Idee ist einfach: Du tippst Wörter in die Sortierfeldspalte
  der Tabelle — eins pro Zeile — und wechselst dann zur
  Textansicht, um alles in deine Zwischenablage zu kopieren. Von dort
  fügst du es in ein LLM, eine Tabellenkalkulation oder ein anderes
  Werkzeug ein, um die restlichen Felder auszufüllen. Wenn du fertig
  bist, füge das Ergebnis wieder ein und klicke auf Stapelweise hinzufügen.

help-selection-heading: "Browserauswahl"
help-selection-desc: >-
  Wähle eine oder mehrere Karten im Browser aus, bevor du AnkiBulk öffnest.
  Der Notiztyp der ersten Karte bestimmt die Tabellenspalten, und alle
  ausgewählten Notizen erscheinen als schreibgeschützte Beispielzeilen (grau).
  Diese Beispiele geben Kontext beim Ausfüllen neuer Notizen — zum Beispiel
  kann ein LLM deine vorhandenen Karten sehen und den Stil übernehmen.
  Wenn nichts ausgewählt ist, kannst du einen beliebigen Notiztyp manuell wählen.

help-table-heading: "Tabellenansicht"
help-table-desc: >-
  Die Tabelle zeigt vorhandene Notizen (schreibgeschützt, grau) und neue
  Notizen (bearbeitbar, weiß). Alle Spalten in bearbeitbaren Zeilen können
  direkt bearbeitet werden. Die Sortierfeldspalte ist mit einer warmen
  Hintergrundfarbe hervorgehoben.

help-table-insert-clipboard: "Zwischenablage als neue Zeilen einfügen (eine Zeile pro Eintrag)."
help-table-update-selection: "Beispielzeilen aus der aktuellen Browserauswahl aktualisieren."
help-table-right-click-header: "Rechtsklick auf Kopfzeile"
help-table-right-click-header-desc: "Spalten ein- oder ausblenden."
help-table-enter: "Aktuelle Zelle bestätigen und zur nächsten Zeile wechseln. Am Ende wird automatisch eine neue Zeile hinzugefügt."
help-table-delete: "Die ausgewählte bearbeitbare Zeile entfernen."
help-table-backspace: "Die ausgewählte Zeile entfernen, wenn das Sortierfeld leer ist."

help-text-heading: "Textansicht"
help-text-desc: >-
  Wechsle zur Textansicht, um Notizen im YAML-Format zu bearbeiten.
  Der obere Bereich zeigt deine ausgewählten Beispielnotizen; der untere
  Bereich ist für deine neuen Notizen. Beim Zurückwechseln zur Tabellenansicht
  wird das YAML validiert und angewendet.

help-text-options: >-
  Konfiguriere das Kopierformat (YAML, JSON, XML, CSV oder TSV),
  ob Beispielnotizen eingeschlossen werden sollen, und zusätzlichen Text.
help-text-copy: >-
  Kopiere den Inhalt im gewählten Format, bereit zum Einfügen
  in ein LLM oder anderes Werkzeug.

help-bulk-add-heading: "Stapelweise hinzufügen"
help-bulk-add-desc: >-
  Klicke auf Stapelweise hinzufügen, um Notizen aus allen bearbeitbaren Zeilen
  zu erstellen, die Inhalt im Sortierfeld haben. Notizen werden dem
  ausgewählten Stapel hinzugefügt.

