# ── ヘルプダイアログ (help.py) ────────────────────────────────────────

help-title: "AnkiBulk ヘルプ"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulkは多くのノートを一度に追加するためのツールです。
  使い方はシンプルです：テーブルのソートフィールド列に単語を入力し
  （1行に1つ）、テキストビューに切り替えて
  すべてをクリップボードにコピーします。そこから
  LLM、スプレッドシート、その他のツールに貼り付けて
  残りのフィールドを埋めます。完了したら結果を貼り付けて
  一括追加をクリックします。

help-selection-heading: "ブラウザの選択"
help-selection-desc: >-
  AnkiBulkを開く前に、ブラウザで1枚以上のカードを選択してください。
  最初のカードのノートタイプがテーブルの列を決定し、
  選択したすべてのノートが読み取り専用の例の行（グレー）として表示されます。
  これらの例は新しいノートを作成する際の参考になります。たとえば、
  LLMが既存のカードを見てスタイルを合わせることができます。
  何も選択していない場合は、任意のノートタイプを手動で選択できます。

help-table-heading: "テーブルビュー"
help-table-desc: >-
  テーブルには既存のノート（読み取り専用、グレー）と新しいノート
  （編集可能、白）が表示されます。編集可能な行のすべての列を直接編集できます。
  ソートフィールド列は暖色の背景色で強調表示されます。

help-table-insert-clipboard: "クリップボードを新しい行として貼り付け（1行につき1エントリ）。"
help-table-update-selection: "現在のブラウザ選択から例の行を更新。"
help-table-right-click-header: "ヘッダーを右クリック"
help-table-right-click-header-desc: "列の表示/非表示を切り替え。"
help-table-enter: "現在のセルを確定して次の行に移動。最後に新しい行が自動的に追加されます。"
help-table-delete: "選択した編集可能な行を削除。"
help-table-backspace: "ソートフィールドが空の場合、選択した行を削除。"

help-text-heading: "テキストビュー"
help-text-desc: >-
  テキストビューに切り替えてYAML形式でノートを編集します。上のペインには
  選択した例のノートが表示され、下のペインは新しいノート用です。
  テーブルビューに戻るとYAMLが検証され適用されます。

help-text-options: >-
  コピー形式（YAML、JSON、XML、CSV、TSV）、
  例のノートを含めるかどうか、追加テキストを設定します。
help-text-copy: >-
  選択した形式で内容をコピーし、
  LLMやその他のツールに貼り付けられます。

help-bulk-add-heading: "一括追加"
help-bulk-add-desc: >-
  一括追加をクリックすると、ソートフィールドに内容がある
  すべての編集可能な行からノートが作成されます。ノートは選択したデッキに追加されます。

help-link-issues: "問題を報告"
help-link-discussions: "提案とディスカッション"
help-link-github: "GitHub"
