# ── Diálogo de ajuda (help.py) ────────────────────────────────────────

help-title: "Ajuda do AnkiBulk"
help-heading: "AnkiBulk"
help-intro: >-
  O AnkiBulk foi projetado para adicionar muitas notas de uma vez.
  A ideia é simples: você digita palavras na coluna do campo de classificação
  da tabela — uma por linha — e depois muda para a
  visualização de Texto para copiar tudo para a área de transferência. De lá,
  cole em um LLM, planilha ou qualquer outra ferramenta para preencher
  os campos restantes. Quando terminar, cole o resultado de volta
  e clique em Adicionar em lote.

help-selection-heading: "Seleção do navegador"
help-selection-desc: >-
  Selecione um ou mais cartões no navegador antes de abrir o AnkiBulk.
  O tipo de nota do primeiro cartão determina as colunas da tabela, e todas
  as notas selecionadas aparecem como linhas de exemplo somente leitura (cinza).
  Esses exemplos dão contexto ao preencher novas notas — por exemplo,
  um LLM pode ver seus cartões existentes e reproduzir o estilo.
  Se nada estiver selecionado, você pode escolher qualquer tipo de nota manualmente.

help-table-heading: "Visualização de tabela"
help-table-desc: >-
  A tabela mostra notas existentes (somente leitura, cinza) e novas notas
  (editáveis, branco). Todas as colunas nas linhas editáveis podem ser editadas
  diretamente. A coluna do campo de classificação é destacada com uma cor de fundo quente.

help-table-insert-clipboard: "Colar a área de transferência como novas linhas (uma linha por entrada)."
help-table-update-selection: "Atualizar linhas de exemplo a partir da seleção atual."
help-table-right-click-header: "Clique com botão direito no cabeçalho"
help-table-right-click-header-desc: "Mostrar ou ocultar colunas."
help-table-enter: "Confirmar a célula atual e ir para a próxima linha. Uma nova linha é adicionada automaticamente no final."
help-table-delete: "Remover a linha editável selecionada."
help-table-backspace: "Remover a linha selecionada se o campo de classificação estiver vazio."

help-text-heading: "Visualização de texto"
help-text-desc: >-
  Mude para a visualização de Texto para editar notas no formato YAML. O painel superior mostra
  suas notas de exemplo; o painel inferior é para suas novas notas.
  Ao voltar para a visualização de Tabela, o YAML é validado e aplicado.

help-text-options: >-
  Configure o formato de cópia (YAML, JSON, XML, CSV ou TSV),
  se deve incluir notas de exemplo e texto adicional.
help-text-copy: >-
  Copie o conteúdo no formato escolhido, pronto para colar
  em um LLM ou outra ferramenta.

help-bulk-add-heading: "Adicionar em lote"
help-bulk-add-desc: >-
  Clique em Adicionar em lote para criar notas de todas as linhas editáveis
  com conteúdo no campo de classificação. As notas são adicionadas ao baralho selecionado.

help-link-issues: "Reportar um problema"
help-link-discussions: "Sugestões e discussão"
