# AnkiBulk — English (en-US)
#
# Syntax:
#   - Simple strings:  key: "value"
#   - Variables:       key: "Hello {name}"  →  tr("key", name="world")
#   - Plurals:         key:
#                        one: "1 item"
#                        other: "{n} items"
#                      →  tr("key", n=5)


