# ── Dialogo guida (help.py) ────────────────────────────────────────

help-title: "Guida AnkiBulk"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk è progettato per aggiungere molte note alla volta.
  L'idea è semplice: digiti le parole nella colonna del campo di ordinamento
  della tabella — una per riga — poi passi alla
  vista Testo per copiare tutto negli appunti. Da lì,
  incolla in un LLM, un foglio di calcolo o qualsiasi altro strumento per compilare
  i campi restanti. Quando hai finito, incolla il risultato
  e fai clic su Aggiunta massiva.

help-selection-heading: "Selezione dal browser"
help-selection-desc: >-
  Seleziona una o più carte nel browser prima di aprire AnkiBulk.
  Il tipo di nota della prima carta determina le colonne della tabella, e tutte
  le note selezionate appaiono come righe di esempio in sola lettura (grigio).
  Questi esempi forniscono contesto nella creazione di nuove note — ad esempio,
  un LLM può vedere le tue carte esistenti e replicare lo stile.
  Se non è selezionato nulla, puoi scegliere qualsiasi tipo di nota manualmente.

help-table-heading: "Vista tabella"
help-table-desc: >-
  La tabella mostra le note esistenti (sola lettura, grigio) e le nuove note
  (modificabili, bianco). Tutte le colonne nelle righe modificabili possono essere
  modificate direttamente. La colonna del campo di ordinamento è evidenziata con un colore di sfondo caldo.

help-table-insert-clipboard: "Incolla gli appunti come nuove righe (una riga per voce)."
help-table-update-selection: "Aggiorna le righe di esempio dalla selezione attuale."
help-table-right-click-header: "Clic destro sull'intestazione"
help-table-right-click-header-desc: "Mostra o nascondi colonne."
help-table-enter: "Conferma la cella attuale e passa alla riga successiva. Una nuova riga viene aggiunta automaticamente alla fine."
help-table-delete: "Rimuovi la riga modificabile selezionata."
help-table-backspace: "Rimuovi la riga selezionata se il campo di ordinamento è vuoto."

help-text-heading: "Vista testo"
help-text-desc: >-
  Passa alla vista Testo per modificare le note in formato YAML. Il pannello superiore mostra
  le note di esempio selezionate; il pannello inferiore è per le nuove note.
  Tornando alla vista Tabella il YAML viene validato e applicato.

help-text-options: >-
  Configura il formato di copia (YAML, JSON, XML, CSV o TSV),
  se includere le note di esempio e il testo aggiuntivo.
help-text-copy: >-
  Copia il contenuto nel formato scelto, pronto per incollare
  in un LLM o altro strumento.

help-bulk-add-heading: "Aggiunta massiva"
help-bulk-add-desc: >-
  Fai clic su Aggiunta massiva per creare note da tutte le righe modificabili
  con contenuto nel campo di ordinamento. Le note vengono aggiunte al mazzo selezionato.

help-link-issues: "Segnala un problema"
help-link-discussions: "Suggerimenti e discussione"
