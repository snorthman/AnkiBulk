# ── Diálogo de ayuda (help.py) ────────────────────────────────────────

help-title: "Ayuda de AnkiBulk"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk está diseñado para agregar muchas notas a la vez.
  La idea es simple: escribes palabras en la columna del campo de orden
  de la tabla — una por fila — y luego cambias a la
  vista de Texto para copiar todo al portapapeles. Desde ahí,
  pégalo en un LLM, una hoja de cálculo o cualquier otra herramienta para completar
  los campos restantes. Cuando termines, pega el resultado
  y haz clic en Agregar en lote.

help-selection-heading: "Selección del navegador"
help-selection-desc: >-
  Selecciona una o más tarjetas en el navegador antes de abrir AnkiBulk.
  El tipo de nota de la primera tarjeta determina las columnas de la tabla, y todas
  las notas seleccionadas aparecen como filas de ejemplo de solo lectura (gris).
  Estos ejemplos dan contexto al crear nuevas notas — por ejemplo,
  un LLM puede ver tus tarjetas existentes y seguir el estilo.
  Si no hay nada seleccionado, puedes elegir cualquier tipo de nota manualmente.

help-table-heading: "Vista de tabla"
help-table-desc: >-
  La tabla muestra las notas existentes (solo lectura, gris) y las nuevas notas
  (editables, blanco). Todas las columnas en las filas editables se pueden editar
  directamente. La columna del campo de orden está resaltada con un color de fondo cálido.

help-table-insert-clipboard: "Pegar el portapapeles como nuevas filas (una fila por línea)."
help-table-update-selection: "Actualizar filas de ejemplo desde la selección actual."
help-table-right-click-header: "Clic derecho en el encabezado"
help-table-right-click-header-desc: "Mostrar u ocultar columnas."
help-table-enter: "Confirmar la celda actual y pasar a la siguiente fila. Se agrega una nueva fila automáticamente al final."
help-table-delete: "Eliminar la fila editable seleccionada."
help-table-backspace: "Eliminar la fila seleccionada si el campo de orden está vacío."

help-text-heading: "Vista de texto"
help-text-desc: >-
  Cambia a la vista de Texto para editar notas en formato YAML. El panel superior muestra
  tus notas de ejemplo; el panel inferior es para tus nuevas notas.
  Al volver a la vista de Tabla se valida y aplica el YAML.

help-text-options: >-
  Configura el formato de copia (YAML, JSON, XML, CSV o TSV),
  si incluir notas de ejemplo, y texto adicional.
help-text-copy: >-
  Copia el contenido en el formato elegido, listo para pegar
  en un LLM u otra herramienta.

help-bulk-add-heading: "Agregar en lote"
help-bulk-add-desc: >-
  Haz clic en Agregar en lote para crear notas de todas las filas editables
  que tengan contenido en el campo de orden. Las notas se agregan al mazo seleccionado.

help-link-issues: "Reportar un problema"
help-link-discussions: "Sugerencias y discusión"
