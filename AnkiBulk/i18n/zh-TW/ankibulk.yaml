# ── 說明對話框 (help.py) ────────────────────────────────────────

help-title: "AnkiBulk 說明"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk 專為一次新增大量筆記而設計。
  方法很簡單：在表格的排序欄位列中輸入單字——每列一個——然後切換到
  文字檢視，將所有內容複製到剪貼簿。接著，
  貼到 LLM、試算表或其他工具中來填寫
  剩餘欄位。完成後，將結果貼回來並
  按下批量新增。

help-selection-heading: "瀏覽器選取"
help-selection-desc: >-
  在開啟 AnkiBulk 之前，在瀏覽器中選取一張或多張卡片。
  第一張卡片的筆記類型決定表格欄位，所有
  選取的筆記以唯讀範例列（灰色）顯示。
  這些範例在填寫新筆記時提供背景——例如，
  LLM 可以看到你現有的卡片並配合風格。
  如果未選取任何內容，可以手動選擇任意筆記類型。

help-table-heading: "表格檢視"
help-table-desc: >-
  表格顯示現有筆記（唯讀，灰色）和新筆記
  （可編輯，白色）。只有排序欄位列可直接編輯；
  雙擊可編輯列中的其他儲存格可跳到該處。

help-table-insert-clipboard: "將剪貼簿貼為新列（每行一個）。"
help-table-update-selection: "從目前瀏覽器選取重新整理範例列。"
help-table-right-click-header: "右鍵按一下標題"
help-table-right-click-header-desc: "顯示或隱藏欄位。"
help-table-enter: "確認目前儲存格並移到下一列。末尾會自動新增新列。"
help-table-delete: "移除選取的可編輯列。"
help-table-backspace: "如果排序欄位為空，則移除選取的列。"

help-text-heading: "文字檢視"
help-text-desc: >-
  切換到文字檢視以 YAML 格式編輯筆記。上方窗格顯示
  你選取的範例筆記；下方窗格用於你的新筆記。
  切換回表格檢視時會驗證並套用 YAML。

help-text-options: >-
  設定複製格式（YAML、JSON、XML、CSV 或 TSV），
  是否包含範例筆記，以及附加文字。
help-text-copy: >-
  以所選格式複製內容，可以直接貼到
  LLM 或其他工具。

help-bulk-add-heading: "批量新增"
help-bulk-add-desc: >-
  按下批量新增，從所有排序欄位有內容的可編輯列
  建立筆記。筆記將新增到所選牌組。

help-link-issues: "回報問題"
help-link-discussions: "建議與討論"
help-link-github: "GitHub"
