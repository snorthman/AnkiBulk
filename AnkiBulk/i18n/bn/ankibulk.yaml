# ── সাহায্য ডায়ালগ (help.py) ────────────────────────────────────────

help-title: "AnkiBulk সাহায্য"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk একসাথে অনেক নোট যোগ করার জন্য তৈরি।
  ধারণাটি সহজ: টেবিলের সর্ট ফিল্ড কলামে শব্দ টাইপ করুন
  — প্রতি সারিতে একটি — তারপর টেক্সট ভিউতে যান
  এবং সবকিছু ক্লিপবোর্ডে কপি করুন। সেখান থেকে
  LLM, স্প্রেডশিট বা অন্য যেকোনো টুলে পেস্ট করে
  বাকি ফিল্ডগুলো পূরণ করুন। শেষ হলে ফলাফল ফেরত পেস্ট করুন
  এবং গোষ্ঠীবদ্ধ সংযোজন ক্লিক করুন।

help-selection-heading: "ব্রাউজার নির্বাচন"
help-selection-desc: >-
  AnkiBulk খোলার আগে ব্রাউজারে এক বা একাধিক কার্ড নির্বাচন করুন।
  প্রথম কার্ডের নোট টাইপ টেবিল কলাম নির্ধারণ করে, এবং সকল
  নির্বাচিত নোট শুধুমাত্র-পঠনযোগ্য উদাহরণ সারি (ধূসর) হিসেবে দেখায়।
  এই উদাহরণগুলো নতুন নোট পূরণ করার সময় প্রসঙ্গ দেয় — উদাহরণস্বরূপ,
  LLM আপনার বিদ্যমান কার্ড দেখে শৈলী মেলাতে পারে।
  কিছু নির্বাচিত না থাকলে আপনি যেকোনো নোট টাইপ ম্যানুয়ালি বেছে নিতে পারেন।

help-table-heading: "টেবিল ভিউ"
help-table-desc: >-
  টেবিল বিদ্যমান নোট (শুধুমাত্র-পঠন, ধূসর) এবং নতুন নোট
  (সম্পাদনযোগ্য, সাদা) দেখায়। সম্পাদনযোগ্য সারির সকল কলাম সরাসরি সম্পাদনা
  করা যায়। সর্ট ফিল্ড কলাম উষ্ণ পটভূমি রঙে হাইলাইট করা হয়।

help-table-insert-clipboard: "ক্লিপবোর্ড নতুন সারি হিসেবে পেস্ট করুন (প্রতি লাইনে একটি এন্ট্রি)।"
help-table-update-selection: "বর্তমান ব্রাউজার নির্বাচন থেকে উদাহরণ সারি রিফ্রেশ করুন।"
help-table-right-click-header: "হেডারে রাইট-ক্লিক"
help-table-right-click-header-desc: "কলাম দেখান বা লুকান।"
help-table-enter: "বর্তমান সেল নিশ্চিত করুন এবং পরবর্তী সারিতে যান। শেষে স্বয়ংক্রিয়ভাবে নতুন সারি যোগ হয়।"
help-table-delete: "নির্বাচিত সম্পাদনযোগ্য সারি সরান।"
help-table-backspace: "সর্ট ফিল্ড খালি থাকলে নির্বাচিত সারি সরান।"

help-text-heading: "টেক্সট ভিউ"
help-text-desc: >-
  টেক্সট ভিউতে যান এবং YAML ফরম্যাটে নোট সম্পাদনা করুন। উপরের প্যানেল
  আপনার নির্বাচিত উদাহরণ নোট দেখায়; নিচের প্যানেল নতুন নোটের জন্য।
  টেবিল ভিউতে ফিরে যাওয়ার সময় YAML যাচাই ও প্রয়োগ হয়।

help-text-options: >-
  কপি ফরম্যাট (YAML, JSON, XML, CSV, বা TSV),
  উদাহরণ নোট অন্তর্ভুক্ত করা এবং অতিরিক্ত টেক্সট কনফিগার করুন।
help-text-copy: >-
  নির্বাচিত ফরম্যাটে বিষয়বস্তু কপি করুন,
  LLM বা অন্য টুলে পেস্ট করার জন্য প্রস্তুত।

help-bulk-add-heading: "গোষ্ঠীবদ্ধ সংযোজন"
help-bulk-add-desc: >-
  গোষ্ঠীবদ্ধ সংযোজন ক্লিক করুন সর্ট ফিল্ডে বিষয়বস্তু আছে এমন
  সকল সম্পাদনযোগ্য সারি থেকে নোট তৈরি করতে। নোট নির্বাচিত ডেকে যোগ হয়।

