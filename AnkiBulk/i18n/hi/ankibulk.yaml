# ── सहायता संवाद (help.py) ────────────────────────────────────────

help-title: "AnkiBulk सहायता"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk एक साथ कई नोट जोड़ने के लिए बनाया गया है।
  विचार सरल है: आप तालिका के क्रम फ़ील्ड कॉलम में शब्द टाइप करें
  — प्रति पंक्ति एक — फिर पाठ दृश्य पर जाएँ
  और सब कुछ क्लिपबोर्ड पर कॉपी करें। वहाँ से
  LLM, स्प्रेडशीट या किसी अन्य उपकरण में चिपकाकर
  शेष फ़ील्ड भरें। पूरा होने पर परिणाम वापस चिपकाएँ
  और सामूहिक जोड़ें पर क्लिक करें।

help-selection-heading: "ब्राउज़र चयन"
help-selection-desc: >-
  AnkiBulk खोलने से पहले ब्राउज़र में एक या अधिक कार्ड चुनें।
  पहले कार्ड का नोट प्रकार तालिका कॉलम तय करता है, और सभी
  चयनित नोट केवल-पढ़ने योग्य उदाहरण पंक्तियों (ग्रे) के रूप में दिखते हैं।
  ये उदाहरण नए नोट भरते समय संदर्भ देते हैं — उदाहरण के लिए,
  LLM आपके मौजूदा कार्ड देखकर शैली का मिलान कर सकता है।
  यदि कुछ भी नहीं चुना है, तो आप कोई भी नोट प्रकार मैन्युअल रूप से चुन सकते हैं।

help-table-heading: "तालिका दृश्य"
help-table-desc: >-
  तालिका मौजूदा नोट (केवल-पढ़ने, ग्रे) और नए नोट
  (संपादन योग्य, सफ़ेद) दिखाती है। संपादन योग्य पंक्तियों के सभी कॉलम सीधे
  संपादित किए जा सकते हैं। क्रम फ़ील्ड कॉलम गर्म पृष्ठभूमि रंग से हाइलाइट है।

help-table-insert-clipboard: "क्लिपबोर्ड को नई पंक्तियों के रूप में चिपकाएँ (प्रति पंक्ति एक प्रविष्टि)।"
help-table-update-selection: "वर्तमान ब्राउज़र चयन से उदाहरण पंक्तियाँ ताज़ा करें।"
help-table-right-click-header: "हेडर पर राइट-क्लिक"
help-table-right-click-header-desc: "कॉलम दिखाएँ या छिपाएँ।"
help-table-enter: "वर्तमान सेल की पुष्टि करें और अगली पंक्ति पर जाएँ। अंत में स्वतः नई पंक्ति जुड़ती है।"
help-table-delete: "चयनित संपादन योग्य पंक्ति हटाएँ।"
help-table-backspace: "यदि क्रम फ़ील्ड खाली है तो चयनित पंक्ति हटाएँ।"

help-text-heading: "पाठ दृश्य"
help-text-desc: >-
  पाठ दृश्य पर जाएँ और YAML प्रारूप में नोट संपादित करें। ऊपरी पैनल
  आपके चयनित उदाहरण नोट दिखाता है; निचला पैनल नए नोट के लिए है।
  तालिका दृश्य पर लौटने पर YAML सत्यापित और लागू होता है।

help-text-options: >-
  कॉपी प्रारूप (YAML, JSON, XML, CSV, या TSV),
  उदाहरण नोट शामिल करने और अतिरिक्त पाठ को कॉन्फ़िगर करें।
help-text-copy: >-
  चयनित प्रारूप में सामग्री कॉपी करें,
  LLM या अन्य उपकरण में चिपकाने के लिए तैयार।

help-bulk-add-heading: "सामूहिक जोड़ें"
help-bulk-add-desc: >-
  सामूहिक जोड़ें पर क्लिक करें ताकि क्रम फ़ील्ड में सामग्री वाली
  सभी संपादन योग्य पंक्तियों से नोट बनें। नोट चयनित डेक में जोड़े जाते हैं।

