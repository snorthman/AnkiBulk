# ── حوار المساعدة (help.py) ────────────────────────────────────────

help-title: "مساعدة AnkiBulk"
help-heading: "AnkiBulk"
help-intro: >-
  AnkiBulk مصمم لإضافة العديد من الملاحظات دفعة واحدة.
  الفكرة بسيطة: تكتب الكلمات في عمود حقل الترتيب
  في الجدول — كلمة واحدة في كل صف — ثم تنتقل إلى
  عرض النص لنسخ كل شيء إلى الحافظة. من هناك،
  الصق في LLM أو جدول بيانات أو أي أداة أخرى لملء
  الحقول المتبقية. عند الانتهاء، الصق النتيجة مرة أخرى
  وانقر على إضافة جماعية.

help-selection-heading: "تحديد المتصفح"
help-selection-desc: >-
  حدد بطاقة واحدة أو أكثر في المتصفح قبل فتح AnkiBulk.
  نوع ملاحظة البطاقة الأولى يحدد أعمدة الجدول، وجميع
  الملاحظات المحددة تظهر كصفوف أمثلة للقراءة فقط (رمادي).
  هذه الأمثلة توفر سياقاً عند إنشاء ملاحظات جديدة — على سبيل المثال،
  يمكن لـ LLM رؤية بطاقاتك الحالية ومطابقة الأسلوب.
  إذا لم يتم تحديد شيء، يمكنك اختيار أي نوع ملاحظة يدوياً.

help-table-heading: "عرض الجدول"
help-table-desc: >-
  يعرض الجدول الملاحظات الحالية (للقراءة فقط، رمادي) والملاحظات الجديدة
  (قابلة للتحرير، أبيض). فقط عمود حقل الترتيب قابل للتحرير مباشرة؛
  انقر نقراً مزدوجاً على خلية أخرى في صف قابل للتحرير للانتقال إليها.

help-table-insert-clipboard: "لصق الحافظة كصفوف جديدة (صف واحد لكل سطر)."
help-table-update-selection: "تحديث صفوف الأمثلة من التحديد الحالي."
help-table-right-click-header: "انقر بزر الفأرة الأيمن على الرأس"
help-table-right-click-header-desc: "إظهار أو إخفاء الأعمدة."
help-table-enter: "تأكيد الخلية الحالية والانتقال إلى الصف التالي. يُضاف صف جديد تلقائياً في النهاية."
help-table-delete: "إزالة الصف القابل للتحرير المحدد."
help-table-backspace: "إزالة الصف المحدد إذا كان حقل الترتيب فارغاً."

help-text-heading: "عرض النص"
help-text-desc: >-
  انتقل إلى عرض النص لتحرير الملاحظات بتنسيق YAML. اللوحة العلوية تعرض
  ملاحظات الأمثلة المحددة؛ اللوحة السفلية لملاحظاتك الجديدة.
  عند العودة إلى عرض الجدول يتم التحقق من YAML وتطبيقه.

help-text-options: >-
  تكوين تنسيق النسخ (YAML أو JSON أو XML أو CSV أو TSV)،
  وما إذا كان يجب تضمين ملاحظات الأمثلة والنص الإضافي.
help-text-copy: >-
  نسخ المحتوى بالتنسيق المختار، جاهز للصق
  في LLM أو أداة أخرى.

help-bulk-add-heading: "إضافة جماعية"
help-bulk-add-desc: >-
  انقر على إضافة جماعية لإنشاء ملاحظات من جميع الصفوف القابلة للتحرير
  التي تحتوي على محتوى في حقل الترتيب. تُضاف الملاحظات إلى الرزمة المحددة.

help-link-issues: "الإبلاغ عن مشكلة"
help-link-discussions: "اقتراحات ونقاش"
help-link-github: "GitHub"
